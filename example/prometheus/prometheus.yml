global:
  scrape_interval: 1s
  evaluation_interval: 1s
  external_labels:
    monitor: 'pg_what_is_happening'

scrape_configs:
  - job_name: 'pg_what_is_happening'
    metrics_path: '/metrics'
    scrape_interval: 1s
    scrape_timeout: 1s
    static_configs:
      - targets: ['localhost:9187']
        labels:
          service: 'pg_what_is_happening'
          instance: 'postgres-primary'
