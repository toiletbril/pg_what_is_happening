name: Regression Test Suite

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-image:
    name: Build base image
    uses: ./.github/workflows/build-image.yml
    permissions:
      contents: read
      packages: write

  run-tests:
    name: Run regression tests on PostgreSQL ${{ matrix.pg_version }}
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [9.4, 12.6, 14.4, 18]
        include:
          - pg_version: 9.4
            pg_branch: REL9_4_STABLE
          - pg_version: 12.6
            pg_branch: REL_12_STABLE
          - pg_version: 14.4
            pg_branch: REL_14_4
          - pg_version: 18
            pg_branch: REL_18_STABLE
    environment:
      name: testing
    env:
      POSTGRES_VERSION: ${{ matrix.pg_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone PostgreSQL
        run: |
          git clone --depth 1 --branch ${{ env.POSTGRES_VERSION }} https://github.com/postgres/postgres.git postgres

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cached image
        run: |
          docker pull ${{ needs.build-image.outputs.image }}
          docker tag ${{ needs.build-image.outputs.image }} pg-what-is-happening-test

      - name: Run tests
        run: |
          POSTGRES_SOURCE=$(pwd)/postgres ./Shfile.sh test

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-log-${{ matrix.pg_version }}
          path: /tmp/postgres.log
          if-no-files-found: ignore

      - name: Summarize test results on failure
        if: failure()
        run: |
          if test -f test/regression.diffs; then
            echo "### Regression Diffs" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            cat test/regression.diffs >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
