name: Regression Test Suite

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  POSTGRES_VERSION: REL_12_STABLE

jobs:
  build-image:
    uses: ./.github/workflows/build-image.yml
    permissions:
      contents: read
      packages: write

  run-tests:
    name: PostgreSQL ${{ env.POSTGRES_VERSION }}
    needs: build-image
    runs-on: ubuntu-latest
    environment:
      name: testing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone PostgreSQL
        run: |
          git clone --depth 1 --branch ${{ env.POSTGRES_VERSION }} https://github.com/postgres/postgres.git postgres

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cached image
        run: |
          docker pull ${{ needs.build-image.outputs.image }}
          docker tag ${{ needs.build-image.outputs.image }} pg-what-is-happening-test

      - name: Run tests
        run: |
          POSTGRES_SOURCE=$(pwd)/postgres ./Shfile.sh test

      - name: Collect test results on failure
        if: failure()
        run: |
          echo "## Test Failure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test/regression.diffs ]; then
            echo "### Regression Diffs" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            cat test/regression.diffs >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
